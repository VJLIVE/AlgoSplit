<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)"/>
  
  <!-- Wallet body -->
  <rect x="20" y="35" width="60" height="45" rx="4" fill="#FFFFFF" opacity="0.95"/>
  
  <!-- Wallet flap -->
  <path d="M 20 35 Q 20 27, 28 27 L 72 27 Q 80 27, 80 35 L 80 42 L 20 42 Z" fill="#FFFFFF"/>
  
  <!-- Wallet clasp -->
  <circle cx="73" cy="58" r="7" fill="#6366F1"/>
  <circle cx="73" cy="58" r="3.5" fill="#FFFFFF"/>
  
  <!-- Card slots -->
  <line x1="28" y1="50" x2="55" y2="50" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="58" x2="55" y2="58" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="66" x2="48" y2="66" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Dollar sign -->
  <text x="38" y="73" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#6366F1" text-anchor="middle">$</text>
</svg>
