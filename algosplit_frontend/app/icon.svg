<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#grad)"/>
  
  <!-- Wallet body -->
  <rect x="20" y="35" width="60" height="45" rx="4" fill="white" opacity="0.95"/>
  
  <!-- Wallet flap/top -->
  <path d="M 20 35 Q 20 25, 30 25 L 70 25 Q 80 25, 80 35 L 80 40 L 20 40 Z" fill="white"/>
  
  <!-- Wallet button/clasp -->
  <circle cx="72" cy="57" r="6" fill="#6366F1"/>
  <circle cx="72" cy="57" r="3" fill="white"/>
  
  <!-- Card slots (lines inside wallet) -->
  <line x1="28" y1="48" x2="52" y2="48" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="55" x2="52" y2="55" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="62" x2="45" y2="62" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Dollar sign accent -->
  <text x="38" y="72" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366F1" text-anchor="middle">$</text>
</svg>
